<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🎉 Bienvenue à la soirée ! 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
body {
font-family: 'Fredoka One', sans-serif;
margin: 0; padding: 0;
background: linear-gradient(135deg, #ff0080, #7928ca);
height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
color: white;
text-align: center;
overflow: hidden;
}
h1 { font-size: 3em; text-shadow: 2px 2px 10px #000; animation: glow 2s infinite alternate; }
@keyframes glow { 0% { text-shadow: 2px 2px 10px #000; } 100% { text-shadow: 2px 2px 20px #fff; } }
button {
padding: 15px 30px; margin-top: 20px; border: none; border-radius: 15px;
background: linear-gradient(90deg, #ffd700, #ff4500);
font-size: 1.2em; cursor: pointer; transition: transform 0.2s, box-shadow 0.3s;
}
button:hover { transform: scale(1.1); box-shadow: 0 0 20px #fff; }
</style>
</head>
<body>

<h1>🔥 Bienvenue à la soirée de 18 ans ! 🔥</h1>
<p>Prêt·e à t’amuser ? 😏</p>
<button onclick="startParty()">Commencer la soirée</button>

<script>
function startParty(){ window.location.href = "quiz.html"; }
</script>

</body>
</html>
