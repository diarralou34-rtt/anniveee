<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>📸 Souvenirs 🎉</title>
<style>
body { font-family: Arial; background:#0f0f0f; color:white; text-align:center; }
.box { background:#1a1a1a; padding:20px; border-radius:15px; margin:20px auto; width:80%; }
img { max-width:200px; margin:10px; border-radius:10px; }
.messageBox { border:1px solid #fff; padding:5px; margin:5px auto; border-radius:5px; max-width:80%; }
</style>
</head>
<body>

<h1>📸 Galerie finale</h1>
<div class="box" id="finalGallery"></div>

<script>
let photoList = JSON.parse(localStorage.getItem("photoList")||"[]");
let messageList = JSON.parse(localStorage.getItem("messageList")||"[]");
let gallery = document.getElementById("finalGallery");

gallery.innerHTML="<h3>Photos</h3>";
photoList.forEach(src=>{
let img = document.createElement("img");
img.src = src;
gallery.appendChild(img);
});

gallery.innerHTML+="<h3>Messages</h3>";
messageList.forEach(txt=>{
let p = document.createElement("p");
p.className="messageBox";
p.innerText=txt;
gallery.appendChild(p);
});
</script>

</body>
</html>
